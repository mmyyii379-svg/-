<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نظام ECO البسيط</title>
<style>
    body { font-family: sans-serif; background: #eee; padding: 10px; }
    .box { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
    input, select, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ccc; }
    button { background: #28a745; color: white; border: none; font-weight: bold; cursor: pointer; }
    .sum { display: flex; gap: 5px; margin-bottom: 10px; }
    .sum div { flex: 1; background: #333; color: white; padding: 10px; border-radius: 5px; text-align: center; }
</style>
</head>
<body>

<div class="sum">
    <div>دينار: <span id="sum-iqd">0</span></div>
    <div>دولار: <span id="sum-usd">0</span></div>
</div>

<div class="box">
    <input id="n" placeholder="الاسم/السيارة">
    <input id="m" type="number" placeholder="المبلغ">
    <select id="c"><option value="IQD">دينار</option><option value="USD">دولار</option></select>
    <button onclick="add()">إضافة</button>
</div>

<div id="list"></div>

<script>
    let d = JSON.parse(localStorage.getItem('data') || '[]');
    function add() {
        d.push({n: document.getElementById('n').value, m: document.getElementById('m').value, c: document.getElementById('c').value});
        localStorage.setItem('data', JSON.stringify(d));
        up();
    }
    function up() {
        let iqd = 0, usd = 0;
        let html = "";
        d.forEach((v, i) => {
            if(v.c === 'IQD') iqd += +v.m; else usd += +v.m;
            html += `<div class="box">${v.n} | ${v.m} ${v.c} <button onclick="del(${i})" style="background:red">حذف</button></div>`;
        });
        document.getElementById('list').innerHTML = html;
        document.getElementById('sum-iqd').innerText = iqd;
        document.getElementById('sum-usd').innerText = usd;
    }
    function del(i) { d.splice(i, 1); localStorage.setItem('data', JSON.stringify(d)); up(); }
    up();
</script>
</body>
</html>
