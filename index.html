<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام الصيانة السحابي</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ccc; }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h3>إضافة سيارة جديدة</h3>
    <input type="text" id="car" placeholder="السيارة">
    <input type="text" id="plate" placeholder="الرقم">
    <input type="text" id="owner" placeholder="اسم الزبون">
    <input type="text" id="work" placeholder="نوع العمل">
    <button onclick="saveData()">حفظ سحابي</button>
</div>

<table id="myTable">
    <tr><th>السيارة</th><th>الرقم</th><th>الزبون</th><th>العمل</th><th>حذف</th></tr>
</table>

<script>
    // رابط سيرفر سحابي بسيط جداً
    const API_URL = "https://api.jsonbin.io/v3/b/66861cbfe41b4d34e40d5dbd?meta=false";

    async function fetchData() {
        let res = await fetch(API_URL);
        let data = await res.json();
        let table = document.getElementById("myTable");
        table.innerHTML = "<tr><th>السيارة</th><th>الرقم</th><th>الزبون</th><th>العمل</th><th>حذف</th></tr>";
        data.forEach((item, index) => {
            table.innerHTML += `<tr><td>${item.car}</td><td>${item.plate}</td><td>${item.owner}</td><td>${item.work}</td><td><button onclick="del(${index})" style="background:red">X</button></td></tr>`;
        });
    }

    async function saveData() {
        let res = await fetch(API_URL);
        let data = await res.json();
        data.push({
            car: document.getElementById('car').value,
            plate: document.getElementById('plate').value,
            owner: document.getElementById('owner').value,
            work: document.getElementById('work').value
        });
        await fetch(API_URL, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
        fetchData();
    }

    async function del(index) {
        let res = await fetch(API_URL);
        let data = await res.json();
        data.splice(index, 1);
        await fetch(API_URL, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
        fetchData();
    }

    fetchData();
</script>
</body>
</html>
